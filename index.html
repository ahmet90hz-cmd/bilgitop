<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilgitop TV</title>
    <style>
        body { background-color: #0f0f12; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 800px; padding: 15px; box-sizing: border-box; }
        .video-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
        #tv-frame { width: 100%; height: 100%; border: none; }
        
        /* 1. Dizi ismi tasarımı (Küçük ve şeffaf) */
        #dizi-tag-box {
            display: none; position: absolute; bottom: 10px; right: 10px;
            font-size: 12px; font-weight: bold; color: rgba(255,255,255,0.7);
            text-shadow: 1px 1px 2px #000; z-index: 98;
        }

        /* 2. Mini reklam tasarımı */
        #silent-ad-banner {
            display: none; position: absolute; bottom: 10px; left: 10px;
            background: rgba(46, 213, 115, 0.8); padding: 3px 8px;
            font-size: 10px; font-weight: bold; color: #fff;
            border-radius: 3px; z-index: 97;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="video-container">
            <div id="dizi-tag-box"></div>
            <div id="silent-ad-banner"></div>
            <iframe id="tv-frame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <div id="live-program-title" style="margin-top:10px; font-size:14px; font-weight:bold;">Yükleniyor...</div>
    </div>

    <script>
        const YT_PARAMS = "?autoplay=1&modestbranding=1&rel=0&playsinline=1";
        const YAYIN_AKISLARI = [
            { start: 0, end: 420, title: "Gece Sineması", url: "https://www.youtube.com/embed/aqz-KE-bpKQ" + YT_PARAMS },
            { start: 420, end: 540, title: "Sabah Haberleri", url: "https://www.youtube.com/embed/M7lc1UVf-VE" + YT_PARAMS },
            { start: 540, end: 550, title: "Reklamlar", url: "https://www.youtube.com/embed/LXb3EKWsInQ" + YT_PARAMS },
            { start: 550, end: 630, title: "EBA Ders", url: "https://www.youtube.com/embed/aqz-KE-bpKQ" + YT_PARAMS },
            { start: 630, end: 690, title: "Oha Ananın qmı", url: "https://www.youtube.com/embed/YE7VzlLtp-4" + YT_PARAMS }
        ];

        function otomasyonuCalistir() {
            var simdi = new Date();
            var dakika = (simdi.getHours() * 60) + simdi.getMinutes();
            var frame = document.getElementById('tv-frame');
            var tag = document.getElementById('dizi-tag-box');
            var ad = document.getElementById('silent-ad-banner');
            
            var aktif = YAYIN_AKISLARI.find(p => dakika >= p.start && dakika < p.end);

            if (aktif) {
                // 4. Yeniden başlamaması için kontrol
                if (frame.src.split('?')[0] !== aktif.url.split('?')[0]) {
                    // Senkronize başlangıç için start süresini hesapla
                    var baslangicZamani = (dakika - aktif.start) * 60;
                    frame.src = aktif.url + "&start=" + baslangicZamani;
                    document.getElementById('live-program-title').innerText = "Yayında: " + aktif.title;
                }
                
                tag.style.display = 'block';
                tag.innerText = aktif.title;

                // 2. 5 dakikada bir reklam (dakika 5'in katı ise)
                if (simdi.getMinutes() % 5 === 0) {
                    ad.style.display = 'block';
                    ad.innerText = "SPONSOR: Bilgitop Fırsatları";
                } else {
                    ad.style.display = 'none';
                }
            }
        }
        setInterval(otomasyonuCalistir, 1000);
    </script>
</body>
</html>
