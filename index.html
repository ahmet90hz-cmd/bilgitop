<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilgitop TV</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            background-color: #222;
            width: 100%;
            text-align: center;
            padding: 15px 0;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 3px solid #ff4757;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }
        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
        }
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
        }
        .video-js {
            width: 100% !important;
            height: auto;
            aspect-ratio: 16/9;
        }
        .channel-list {
            margin-top: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            width: 100%;
        }
        .channel-btn {
            background: #2f3542;
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .channel-btn:hover, .channel-btn.active {
            background: #ff4757;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(255, 71, 87, 0.4);
        }
        @media (max-width: 600px) {
            header { font-size: 20px; padding: 10px 0; }
            .container { padding: 10px; }
            .channel-btn { padding: 12px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <header>📺 BİLGİTOP TV</header>

    <div class="container">
        <div class="video-container">
            <video id="tv-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" data-setup='{}'>
                <p class="vjs-no-js">Videoyu izlemek için JavaScript'i etkinleştirin.</p>
            </video>
        </div>

        <div class="channel-list">
            <button class="channel-btn active" onclick="changeChannel('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8', this)">🍿 Sinema Test</button>
            <button class="channel-btn" onclick="changeChannel('https://demo.unified-streaming.com/kaltura/the-daily-show/playlist.m3u8', this)">🎬 Dizi Test</button>
            <button class="channel-btn" onclick="changeChannel('https://playertest.longtailvideo.com/adaptive/bipbop/bipbop.m3u8', this)">🎵 Müzik Test</button>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        var player = videojs('tv-player');
        
        player.src({
            src: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8',
            type: 'application/x-mpegURL'
        });

        function changeChannel(url, element) {
            var buttons = document.getElementsByClassName('channel-btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            element.classList.add('active');

            player.src({
                src: url,
                type: 'application/x-mpegURL'
            });
            player.play().catch(function(error) {
                console.log("Oynatılamadı.");
            });
        }
    </script>
</body>
</html>
