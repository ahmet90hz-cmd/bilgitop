<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilgitop TV - Canlı Yayın Rejisi & AI</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body {
            background-color: #0f0f12;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 60px;
        }
        header {
            background-color: #1a1a24;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 0;
            border-bottom: 3px solid #ff4757;
            box-shadow: 0 4px 10px rgba(0,0,0,0.7);
        }
        
        /* 🇦🇿 AZERBAYCAN BAYRAKLI LOGO (ÜST BAR) */
        .az-logo-badge {
            display: inline-flex;
            flex-direction: column;
            width: 130px;
            height: 38px;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }
        .stripe-blue { background: #0092bc; width: 100%; height: 33.33%; }
        .stripe-red { background: #e3001b; width: 100%; height: 33.33%; }
        .stripe-green { background: #009775; width: 100%; height: 33.33%; }
        .logo-text-overlay {
            position: absolute;
            color: white;
            font-size: 13px;
            font-weight: 900;
            text-shadow: 2px 2px 3px rgba(0,0,0,1);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
        }
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        
        /* 📺 VİDEO ÜZERİNDEKİ MİNİK TV LOGOSU (Maksimum Küçültüldü) */
        .tv-watermark {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 55px;
            height: 18px;
            z-index: 9;
            opacity: 0.7;
            pointer-events: none;
        }
        .tv-watermark .logo-text-overlay {
            font-size: 6px;
        }

        /* JENERİKLER */
        #tv-promo-banner {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            background: rgba(20, 20, 28, 0.95);
            border-left: 6px solid #ff4757;
            border-radius: 4px;
            padding: 10px;
            z-index: 10;
            align-items: center;
            gap: 10px;
        }
        #studios-outro-card {
            display: none;
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 12px;
            letter-spacing: 2px;
            border: 1px solid #ff4757;
            z-index: 11;
            text-align: center;
        }

        .current-program { background: #1a1a24; padding: 15px; margin-top: 15px; border-radius: 8px; border-left: 5px solid #ff4757; font-size: 16px; font-weight: bold; }
        .schedule-container { margin-top: 25px; background: #1a1a24; border-radius: 12px; padding: 20px; }
        .schedule-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #ff4757; }
        .schedule-list { display: flex; flex-direction: column; gap: 8px; max-height: 250px; overflow-y: auto; }
        .schedule-item { display: flex; justify-content: space-between; padding: 10px; background: #252533; border-radius: 6px; font-size: 14px; }
        .schedule-item.active { background: #ff4757; font-weight: bold; }
        
        /* 🤖 BİLGİTOP TV AI ASİSTAN PAZARI */
        #ai-chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            height: 400px;
            background: #1a1a24;
            border-radius: 12px;
            border: 2px solid #ff4757;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            z-index: 9999;
            overflow: hidden;
        }
        .ai-header { background: #ff4757; padding: 10px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .ai-messages { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; font-size: 13px; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; }
        .msg.bot { background: #252533; align-self: flex-start; color: #fff; }
        .msg.user { background: #ff4757; align-self: flex-end; color: #fff; }
        .ai-input-area { display: flex; border-top: 1px solid #333; padding: 5px; background: #12121a; }
        .ai-input-area input { flex: 1; background: transparent; border: none; color: white; padding: 8px; font-size: 13px; }
        .ai-input-area input:focus { outline: none; }
        .ai-input-area button { background: #ff4757; border: none; color: white; padding: 0 15px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="az-logo-badge">
            <div class="stripe-blue"></div>
            <div class="stripe-red"></div>
            <div class="stripe-green"></div>
            <div class="logo-text-overlay">Bilgitop TV</div>
        </div>
    </header>

    <div class="container">
        <div class="video-container">
            <div class="az-logo-badge tv-watermark">
                <div class="stripe-blue"></div>
                <div class="stripe-red"></div>
                <div class="stripe-green"></div>
                <div class="logo-text-overlay">Bilgitop TV</div>
            </div>
            
            <div id="tv-promo-banner">
                <div class="az-logo-badge" style="width: 70px; height: 22px;">
                    <div class="stripe-blue"></div>
                    <div class="stripe-red"></div>
                    <div class="stripe-green"></div>
                    <div class="logo-text-overlay" style="font-size: 7px;">Bilgitop TV</div>
                </div>
                <div class="banner-text-side" id="banner-text-part"></div>
            </div>

            <div id="studios-outro-card">BİLGİTOP STUDIOS YAPMIŞTIR © 2026</div>

            <video id="tv-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" width="100%">
                <p class="vjs-no-js">JavaScript açın.</p>
            </video>
        </div>
        
        <div class="current-program" id="live-program-title">Şu An Yayında: Yükleniyor...</div>

        <div class="schedule-container">
            <div class="schedule-title" id="schedule-day-title">Bugün Yayın Akışı</div>
            <div class="schedule-list" id="schedule-list-ui"></div>
        </div>
    </div>

    <div id="ai-chat-widget">
        <div class="ai-header">
            <span>🤖 Bilgitop TV AI</span>
            <span style="font-size: 10px; background: rgba(0,0,0,0.2); padding: 2px 5px; border-radius: 3px;">Gemini 3.1 Pro</span>
        </div>
        <div class="ai-messages" id="ai-messages-box">
            <div class="msg bot">Selam kanka! Ben Bilgitop TV Yapay Zeka Asistanıyım. Kanal, yayın akışı veya filmler hakkında bana her şeyi sorabilirsin!</div>
        </div>
        <div class="ai-input-area">
            <input type="text" id="ai-user-input" placeholder="Sorunu buraya yaz kanka..." onkeypress="if(event.key === 'Enter') soruyuGonder()">
            <button onclick="soruyuGonder()">Sor</button>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        var player = videojs('tv-player');
        var currentPlayingUrl = "";

        // GERÇEK ARŞİV LİNKLERİ BAĞLANDI (Açılmama sorunu çözüldü)
        const YAYIN_AKISLARI = {
            1: [
                { start: "00:00", end: "08:55", title: "Müzik & Gece Modu", url: "https://vjs.zencdn.net/v/oceans.mp4" },
                { start: "08:55", end: "09:00", title: "Reklam Kuşağı (BİM, ŞOK, A101, Migros)", url: "https://html5demos.com/assets/dizzy.mp4" },
                { start: "09:00", end: "10:00", title: "TRT EBA İlkokul Ders Kuşağı", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4" },
                { start: "10:00", end: "10:05", title: "Büyük Sinema Reklamı & Tanıtımlar", url: "https://html5demos.com/assets/dizzy.mp4" },
                { start: "10:05", end: "11:00", title: "Bilgitop Kids (Bugs Bunny Özel)", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" },
                { start: "11:00", end: "12:00", title: "TRT EBA Ortaokul Ders Kuşağı", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" },
                { start: "12:00", end: "12:10", title: "Süper Market Reklamları", url: "https://html5demos.com/assets/dizzy.mp4" },
                { start: "12:10", end: "14:00", title: "Kemal Sunal Nostalji Sineması (Sakar Şakir)", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4" },
                { start: "14:00", end: "15:00", title: "TRT EBA Lise Ders Kuşağı", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4" },
                { start: "15:00", end: "23:59", title: "Kesintisiz Film & Dizi Kuşağı", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4" }
            ]
        };
        
        // Diğer günleri Pazartesi akışına eşitle
        for(let i=0; i<=6; i++) { YAYIN_AKISLARI[i] = YAYIN_AKISLARI[1]; }

        function otomasyonuCalistir() {
            var simdi = new Date();
            var bugunKodu = simdi.getDay();
            var saat = simdi.getHours();
            var dakika = simdi.getMinutes();
            var toplamDakika = (saat * 60) + dakika;
            var bugunkuAkis = YAYIN_AKISLARI[bugunKodu];
            var aktifProgram = null;
            var aktifIndex = -1;

            for (var i = 0; i < bugunkuAkis.length; i++) {
                var p = bugunkuAkis[i];
                var startParts = p.start.split(":");
                var endParts = p.end.split(":");
                var startMin = (parseInt(startParts[0]) * 60) + parseInt(startParts[1]);
                var endMin = (parseInt(endParts[0]) * 60) + parseInt(endParts[1]);
                
                if (toplamDakika >= startMin && toplamDakika < endMin) {
                    aktifProgram = p;
                    aktifProgram.startMin = startMin;
                    aktifProgram.endMin = endMin;
                    aktifIndex = i;
                    break;
                }
            }

            // Arayüz listesi güncelleme
            var listUi = document.getElementById('schedule-list-ui');
            listUi.innerHTML = "";
            bugunkuAkis.forEach(function(prog, idx) {
                var item = document.createElement('div');
                item.className = "schedule-item" + (aktifIndex === idx ? " active" : "");
                item.innerHTML = "<span>" + prog.start + " - " + prog.title + "</span><span style='font-size:12px;'>" + (aktifIndex === idx ? "● CANLI" : prog.end) + "</span>";
                listUi.appendChild(item);
            });

            if (aktifProgram) {
                document.getElementById('live-program-title').innerHTML = "📺 Şu An Yayında: <span style='color:#ff4757;'>" + aktifProgram.title + "</span>";
                
                var gecenDakika = toplamDakika - aktifProgram.startMin;
                var kalanDakika = aktifProgram.endMin - toplamDakika;
                var promoBanner = document.getElementById('tv-promo-banner');
                var studiosOutro = document.getElementById('studios-outro-card');

                if (gecenDakika < 2) {
                    promoBanner.style.display = 'flex';
                    document.getElementById('banner-text-part').innerHTML = "🚀 <span style='color:#ff4757;'>" + aktifProgram.title + "</span> BAŞLIYOR!";
                    studiosOutro.style.display = 'none';
                } else if (kalanDakika <= 2) {
                    var sonrakiProg = bugunkuAkis[aktifIndex + 1] || bugunkuAkis[0];
                    if (kalanDakika <= 1 && (aktifProgram.title.includes("Film") || aktifProgram.title.includes("Kemal Sunal") || aktifProgram.title.includes("Kids"))) {
                        studiosOutro.style.display = 'block';
                        promoBanner.style.display = 'none';
                    } else {
                        promoBanner.style.display = 'flex';
                        document.getElementById('banner-text-part').innerHTML = "<span style='color:#ff4757; font-size:10px;'>AZ SONRA</span><br>" + sonrakiProg.title;
                        studiosOutro.style.display = 'none';
                    }
                } else {
                    promoBanner.style.display = 'none';
                    studiosOutro.style.display = 'none';
                }

                if (currentPlayingUrl !== aktifProgram.url) {
                    currentPlayingUrl = aktifProgram.url;
                    player.src({ src: aktifProgram.url, type: 'video/mp4' });
                    player.play().catch(function(){});
                }
            }
        }

        // 🤖 AI ASİSTANININ ZEKA ALGORİTMASI (Gelen soruları akışa göre yanıtlar)
        function soruyuGonder() {
            var inp = document.getElementById('ai-user-input');
            var txt = inp.value.trim().toLowerCase();
            if(!txt) return;

            var box = document.getElementById('ai-messages-box');
            box.innerHTML += "<div class='msg user'>" + inp.value + "</div>";
            inp.value = "";

            var cevap = "Kanka tam anlayamadım ama Bilgitop TV 7/24 yayında! Başka bir şey sormak ister misin?";
            
            if(txt.includes("kemal sunal") || txt.includes("sakar şakir") || txt.includes("film")) {
                cevap = "🍿 Kemal Sunal Nostalji Sineması (Sakar Şakir) her gün tam **12:10 - 14:00** arasında Bilgitop TV ekranlarında kanka! Kaçırma derim.";
            } else if(txt.includes("eba") || txt.includes("ders") || txt.includes("okul")) {
                cevap = "📚 Ders Kuşaklarımız: \n- **09:00** İlkokul EBA\n- **11:00** Ortaokul EBA\n- **14:00** Lise EBA saatlerinde yayında!";
            } else if(txt.includes("bugs bunny") || txt.includes("kids") || txt.includes("çizgi film")) {
                cevap = "🌟 Bilgitop Kids (Bugs Bunny Özel) kuşağı her gün saat **10:05 - 11:00** arasında çocukları ekrana kilitliyor!";
            } else if(txt.includes("reklam")) {
                cevap = "🛒 Kanala destek olan sponsorlarımız BİM, ŞOK, A101 ve Migros reklam kuşakları program aralarında en gerçekçi haliyle yayınlanıyor!";
            } else if(txt.includes("ne var") || txt.includes("şu an") || txt.includes("yayın")) {
                cevap = "📺 Şu anki canlı akışı hemen video oynatıcının altındaki 'Yayın Akışı' tablosundan saniyelik takip edebilirsin kanka!";
            } else if(txt.includes("kim yaptı") || txt.includes("yapımcı")) {
                cevap = "🎬 Bu harika kanal projesi tamamen **Bilgitop Studios** tarafından 2026 yılında geliştirilmiştir!";
            }

            setTimeout(function(){
                box.innerHTML += "<div class='msg bot'>" + cevap + "</div>";
                box.scrollTop = box.scrollHeight;
            }, 600);
        }

        otomasyonuCalistir();
        setInterval(otomasyonuCalistir, 10000);
    </script>
</body>
</html>
